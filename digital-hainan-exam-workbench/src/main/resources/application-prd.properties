# DataSource - H2 In-Memory
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:digital_hainan_exam;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.druid.validation-query=SELECT 1

# DDL Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# JWT
jwt.secret=digital-hainan-exam-jwt-secret-key
jwt.issuer=digital-hainan-exam
jwt.expiration-hours=2

# SpringDoc Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

